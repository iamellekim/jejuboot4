<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>사계 밥집 추천 — 지금 위치 기반</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #f6f5f0;
    --panel: #ffffff;
    --ink: #1f2421;
    --sub: #6b7280;
    --accent: #e4572e;
    --accent-soft: #fde8e2;
    --line: #e9e7e0;
    --shadow: 0 6px 24px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    color: var(--ink);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    z-index: 500;
  }
  header h1 { margin: 0; font-size: 18px; letter-spacing: -.3px; }
  header p { margin: 3px 0 0; font-size: 12.5px; color: var(--sub); }
  #status { font-weight: 600; color: var(--accent); }

  .layout { flex: 1; display: flex; min-height: 0; }
  .map-wrap { position: relative; flex: 1; min-height: 0; }
  #map { width: 100%; height: 100%; }

  .sidebar {
    width: 360px;
    max-width: 42vw;
    background: var(--panel);
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
  }
  .chip {
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--sub);
    cursor: pointer;
    transition: .15s;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .list { overflow-y: auto; flex: 1; padding: 6px 0; }
  .card {
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .12s;
  }
  .card:hover, .card.active { background: var(--accent-soft); }
  .card .row1 { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .card .name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
  .card .dist { font-size: 12px; color: var(--accent); font-weight: 700; white-space: nowrap; }
  .card .cat { display: inline-block; font-size: 11px; color: var(--sub); background: #f1efe9; padding: 2px 8px; border-radius: 6px; margin-top: 6px; }
  .card .desc { font-size: 12.5px; color: var(--sub); margin-top: 6px; line-height: 1.45; }
  .card .meta { font-size: 11.5px; color: #9aa0a6; margin-top: 5px; }

  .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.5; }
  .leaflet-popup-content b { font-size: 14px; }
  .pop-cat { color: var(--accent); font-weight: 600; }
  .pop-link { display: inline-block; margin-top: 6px; color: var(--accent); text-decoration: none; font-weight: 600; }

  .me-dot {
    width: 16px; height: 16px; background: #2b6cff; border: 3px solid #fff;
    border-radius: 50%; box-shadow: 0 0 0 4px rgba(43,108,255,.25);
  }

  .fab {
    position: absolute; right: 14px; bottom: 14px; z-index: 600;
    background: var(--accent); color: #fff; border: none;
    padding: 11px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
    box-shadow: var(--shadow); cursor: pointer;
  }

  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    #map { height: 45vh; flex: none; }
    .sidebar { width: 100%; max-width: none; border-left: none; border-top: 1px solid var(--line); flex: 1; }
  }
</style>
</head>
<body>
  <header>
    <h1>🍚 사계 밥집 추천</h1>
    <p><span id="status">위치 확인 중…</span> · 오피스 제주 사계 주변 · 가까운 순 정렬</p>
  </header>

  <div class="layout">
    <div class="map-wrap">
      <div id="map"></div>
      <button class="fab" id="locateBtn">📍 내 위치로</button>
    </div>
    <aside class="sidebar">
      <div class="filters" id="filters"></div>
      <div class="list" id="list"></div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  // 오피스 제주 사계 추정 위치 (위치 권한 거부 시 기본값)
  const OFFICE = { lat: 33.2326, lng: 126.3110 };

  // 사계리·산방산 일대 실제 맛집 (좌표는 산방산/사계해변/용머리 일대 근사값)
  const PLACES = [
    { name: "사계정선장", cat: "횟집", lat: 33.2278, lng: 126.3096,
      desc: "선장님이 직접 잡은 자연산 생선 모듬회. 산방산·오션뷰.", meta: "15:00–23:00 · 월 휴무" },
    { name: "남경미락", cat: "횟집", lat: 33.2335, lng: 126.3128,
      desc: "제주 다금바리 1번지로 불리는 노포. 무료주차.", meta: "다금바리 전문" },
    { name: "사계전복", cat: "전복요리", lat: 33.2349, lng: 126.3132,
      desc: "전복돌솥밥·전복구이. 돌솥밥 1인 13,000원.", meta: "산방산 근처" },
    { name: "사계소희네국수", cat: "국수", lat: 33.2342, lng: 126.3109,
      desc: "고기국수·몸국. 유채꽃밭 뷰.", meta: "09:30–19:00 · 수 휴무" },
    { name: "춘미향", cat: "한식", lat: 33.2351, lng: 126.3140,
      desc: "김치찜이 유명한 가족외식 한식당.", meta: "산방산 근처" },
    { name: "장수해장국", cat: "해장국", lat: 33.2360, lng: 126.3125,
      desc: "고사리해장국 9,000원, 두루치기 9,000원.", meta: "산방산 근처" },
    { name: "고래성", cat: "중식", lat: 33.2333, lng: 126.3101,
      desc: "통오징어뿔소라짬뽕 17,000원, 볶음밥 8,000원.", meta: "해물짬뽕 전문" },
    { name: "드림카츠", cat: "돈가스", lat: 33.2357, lng: 126.3150,
      desc: "신호등치즈돈가스 17,000원. 산방산 뷰.", meta: "돈가스 전문" },
    { name: "고할망네", cat: "한식", lat: 33.2345, lng: 126.3095,
      desc: "생선조림 등 제주 가정식.", meta: "현지인 맛집" },
    { name: "미도식당", cat: "갈치", lat: 33.2369, lng: 126.3118,
      desc: "갈치조림·갈치구이. 이효리 단골집으로 알려짐.", meta: "갈치 전문" },
    { name: "커피스케치", cat: "카페", lat: 33.2306, lng: 126.3149,
      desc: "크로플·테라스 좌석. 용머리해안 뷰.", meta: "디저트 카페" },
    { name: "원앤온리", cat: "카페", lat: 33.2289, lng: 126.3115,
      desc: "산방산 정면 루프탑 카페. 데이트 명소.", meta: "루프탑 카페" }
  ];

  const CAT_ICON = { 횟집:"🐟", 전복요리:"🦪", 국수:"🍜", 한식:"🍚", 해장국:"🥣",
    중식:"🍝", 돈가스:"🍱", 갈치:"🐠", 카페:"☕" };

  let map, meMarker, markers = {}, current = { ...OFFICE }, activeCat = "전체";

  function dist(a, b) {
    const R = 6371, toR = d => d * Math.PI / 180;
    const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
    const x = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  }
  const fmtDist = km => km < 1 ? Math.round(km*1000) + "m" : km.toFixed(1) + "km";

  function initMap() {
    map = L.map("map", { zoomControl: true }).setView([OFFICE.lat, OFFICE.lng], 15);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap", maxZoom: 19
    }).addTo(map);

    PLACES.forEach(p => {
      const icon = L.divIcon({ className: "", html:
        `<div style="font-size:24px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))">${CAT_ICON[p.cat]||"📍"}</div>`,
        iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-26] });
      const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
      const q = encodeURIComponent(p.name + " 제주 사계리");
      m.bindPopup(
        `<b>${p.name}</b><br><span class="pop-cat">${p.cat}</span><br>${p.desc}<br>` +
        `<small style="color:#888">${p.meta}</small><br>` +
        `<a class="pop-link" href="https://map.kakao.com/?q=${q}" target="_blank">카카오맵에서 보기 →</a>`);
      markers[p.name] = m;
    });
    setMe(OFFICE.lat, OFFICE.lng);
    setTimeout(() => map.invalidateSize(), 200);
    window.addEventListener("resize", () => map.invalidateSize());
  }

  function setMe(lat, lng) {
    current = { lat, lng };
    if (meMarker) map.removeLayer(meMarker);
    meMarker = L.marker([lat, lng], {
      icon: L.divIcon({ className: "", html: '<div class="me-dot"></div>', iconSize:[16,16], iconAnchor:[8,8] })
    }).addTo(map).bindPopup("내 위치");
    render();
  }

  function buildFilters() {
    const cats = ["전체", ...Array.from(new Set(PLACES.map(p => p.cat)))];
    const box = document.getElementById("filters");
    box.innerHTML = "";
    cats.forEach(c => {
      const b = document.createElement("button");
      b.className = "chip" + (c === activeCat ? " active" : "");
      b.textContent = c === "전체" ? "전체" : (CAT_ICON[c]||"") + " " + c;
      b.onclick = () => { activeCat = c; buildFilters(); render(); };
      box.appendChild(b);
    });
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    PLACES.map(p => ({ ...p, d: dist(current, p) }))
      .filter(p => activeCat === "전체" || p.cat === activeCat)
      .sort((a, b) => a.d - b.d)
      .forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          `<div class="row1"><span class="name">${p.name}</span><span class="dist">${fmtDist(p.d)}</span></div>` +
          `<span class="cat">${CAT_ICON[p.cat]||""} ${p.cat}</span>` +
          `<div class="desc">${p.desc}</div><div class="meta">${p.meta}</div>`;
        card.onclick = () => {
          map.setView([p.lat, p.lng], 17, { animate: true });
          markers[p.name].openPopup();
          document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");
        };
        list.appendChild(card);
      });
  }

  function locate() {
    const s = document.getElementById("status");
    if (!navigator.geolocation) { s.textContent = "위치 미지원 — 오피스 제주 사계 기준"; return; }
    s.textContent = "위치 확인 중…";
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude } = pos.coords;
        setMe(latitude, longitude);
        map.setView([latitude, longitude], 15);
        s.textContent = "현재 위치 기준";
      },
      () => { s.textContent = "위치 권한 없음 — 오피스 제주 사계 기준"; setMe(OFFICE.lat, OFFICE.lng); },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  initMap();
  buildFilters();
  document.getElementById("locateBtn").onclick = locate;
  locate();
  </script>
</body>
</html>
